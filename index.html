<script>

let products=[
{name:"Campechana",price:18000},
{name:"Gringas",price:15000},
{name:"Burritos",price:18000},
{name:"Tacos",price:15000},
{name:"Pozoles",price:18000},
{name:"Nachos",price:15000}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

function loadMenu(){
let menu=document.getElementById("menu");
products.forEach((p,i)=>{
menu.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p class="price">$${p.price}</p>
<button class="btn" onclick="addToCart(${i})">Agregar</button>
</div>`;
});
}

function addToCart(i){cart.push(products[i]);saveCart();updateCart();}
function removeItem(index){cart.splice(index,1);saveCart();updateCart();}
function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));}

function updateCart(){
document.getElementById("count").innerText=cart.length;
let items=document.getElementById("cartItems");
items.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
items.innerHTML+=`
<div style="display:flex;justify-content:space-between;margin-bottom:8px;">
<span>${item.name} - $${item.price}</span>
<button onclick="removeItem(${index})">❌</button>
</div>`;
total+=item.price;
});

let delivery=parseInt(document.getElementById("delivery").value||0);
total+=delivery;
document.getElementById("total").innerText=total;
}

function toggleCart(){document.getElementById("cartBox").classList.toggle("active");}
function toggleDark(){document.body.classList.toggle("dark");}

function pagarNequi(){
if(cart.length===0){alert("El carrito está vacío");return;}
let total=parseInt(document.getElementById("total").innerText);
alert("Envía el pago Nequi al número 317 618 4453\nValor: $"+total);
}

function enviarWhatsApp(){
if(cart.length===0){alert("El carrito está vacío");return;}
let total=document.getElementById("total").innerText;
let mensaje="Hola DON CIPRIO 👋\n\nPedido:\n";
cart.forEach(item=>{mensaje+=`• ${item.name} - $${item.price}\n`;});
mensaje+=`\nTotal: $${total}`;
window.open("https://wa.me/573176184453?text="+encodeURIComponent(mensaje));
}

function generarFactura(){
if(cart.length===0){alert("El carrito está vacío");return;}
const { jsPDF } = window.jspdf;
let doc = new jsPDF();
let total=document.getElementById("total").innerText;
doc.text("DON CIPRIO",20,20);
doc.text("Factura",20,30);
let y=40;
cart.forEach(item=>{doc.text(`${item.name} - $${item.price}`,20,y);y+=10;});
doc.text("Total: $"+total,20,y+10);
doc.save("Factura_DonCiprio.pdf");
}

loadMenu();
updateCart();

</script>
